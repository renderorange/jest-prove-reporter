name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: "Custom version (only used if type is 'custom')"
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint check
        run: npm run lint:check

      - name: Determine new version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION="${LATEST_TAG#v}"

          if [ "${{ github.event.inputs.version_type }}" == "custom" ]; then
              NEW_VERSION="${{ github.event.inputs.custom_version }}"
          else
              NEW_VERSION=$(node -p "
                  const v = '${CURRENT_VERSION}'.split('.');
                  const t = '${{ github.event.inputs.version_type }}';
                  if (t === 'major') [parseInt(v[0])+1, 0, 0].join('.');
                  else if (t === 'minor') [v[0], parseInt(v[1])+1, 0].join('.');
                  else [v[0], v[1], parseInt(v[2])+1].join('.');
              ")
          fi

          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
          echo "New version: $NEW_VERSION"

      - name: Validate version
        run: |
          if [ -z "${{ steps.version.outputs.new_version }}" ]; then
              echo "Error: New version is empty"
              exit 1
          fi
          if [ "${{ steps.version.outputs.current_version }}" == "${{ steps.version.outputs.new_version }}" ]; then
              echo "Error: New version is the same as current version"
              exit 1
          fi
          if git rev-parse "v${{ steps.version.outputs.new_version }}" >/dev/null 2>&1; then
              echo "Error: Tag v${{ steps.version.outputs.new_version }} already exists"
              exit 1
          fi

      - name: Update package.json version
        run: |
          node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '${{ steps.version.outputs.new_version }}';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4) + '\n');
          "

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add package.json
          if ! git diff --cached --quiet; then
              git commit -m "chore(release): v${{ steps.version.outputs.new_version }}"
          fi

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"

      - name: Push to main
        run: git push origin main

      - name: Push tag
        run: git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.new_version }}"
          name: "v${{ steps.version.outputs.new_version }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
